<!doctype html>

<html>

<head>
    <title>The Great Gatsby Plaza Hotel Simulator</title>
    <style>
        /* Basic page styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }

        /* Full-screen loading overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            /* Keeps loader on top of everything */
            transition: opacity 0.5s ease, visibility 0.5s;
            /* Smooth fade out */
        }

        /* The spinning circle */
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e0e0;
            /* Light grey track */
            border-top: 5px solid #3498db;
            /* Blue moving segment */
            border-radius: 50%;
            /* Makes it a circle */
            animation: spin 1s linear infinite;
            /* Keeps it looping */
        }

        /* Animation timeline */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Class to hide the overlay cleanly */
        .hidden {
            opacity: 0;
            visibility: hidden;
        }

        .auto-expand {
            /* The magic line that enables auto-growing */
            field-sizing: content;

            /* Good practice to set boundaries */
            width: 100%;
            min-width: 200px;
            min-height: 40px;
            max-height: 300px;

            padding: 8px;
            box-sizing: border-box;
            font-family: sans-serif;
            resize: none;
            /* Disables the manual manual resize handle */
        }
    </style>
</head>

<body style="background-color: #f5f5f5">
    <h1 style="color: #0000ff" ;><b>Welcome to Plaza Hotel</b></h1>
    <h3 style="color: #080600" ;>
        <b>You are playing the character Great Gatsby, also known as Jay Gatsby. Then, you go to the Plaza Hotel. Your
            goal is to convince Daisy to tell Tom that she never loved him and that she wants to be with you instead.
            This is on pages 108-117 in Chapter 9.</b>
    </h3>

    <body>
        <div class="overlay" id="loadingScreen">
            <div class="loading-spinner"></div>
        </div>

        <p id="messages"></p>
        <p id="userInput">
            Gatsby: <input type="text" id="gatsbyPrompt" name="gatsbyPrompt" placeholder="Daisy never loved you Tom!" size="35"/> <button onclick="submitGatsbyPrompt()">Submit</button>
        </p>

        <script src="./prompts.js"></script>
        <script src="./messages.js"></script>

        <script>
            window.addEventListener("load", () => {
                const loader = document.getElementById("loadingScreen");
                loader.classList.add("hidden");
            });
        </script>
    </body>

</html>
